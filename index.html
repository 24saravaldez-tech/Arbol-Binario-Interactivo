<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Árbol Binario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body class="bg-light">

    <header class="container my-4">
        <div class="p-3 bg-white border rounded-3 shadow-sm">
            <div class="row g-3 justify-content-center align-items-center">
                <div class="col-md-3">
                    <div class="input-group">
                        <input type="number" id="input-insertar" class="form-control" placeholder="Número">
                        <button id="btn-insertar" class="btn btn-primary" type="button">Guardar</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="input-group">
                        <input type="number" id="input-buscar" class="form-control" placeholder="Número">
                        <button id="btn-buscar" class="btn btn-warning text-dark" type="button">Buscar</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="input-group">
                        <button id="btn-eliminar" class="btn btn-danger" type="button">Limpiar</button>
                    </div>
                </div>
                <div class="col-md-3 text-center">
                    <button id="btn-inorder" class="btn btn-success w-100" type="button">Mostrar InOrder</button>
                </div>
            </div>
        </div>
    </header>

    <main class="tree-wrapper">
        <div id="tree-root-container" class="tree-container">
            <!-- <div class="tree-node">
                <div class="node-value">10</div>
                <div class="node-children">
                    <div class="node-empty"></div>
                    <div class="node-empty"></div>
                </div>
            </div> -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./app.js"></script>
</body>

</html>
